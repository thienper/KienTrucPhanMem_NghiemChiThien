# ========== Spring Boot Partition Demo Configuration ==========

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: partition-demo
  
  # SQL Server Configuration
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=PartitioningDB;encrypt=false;trustServerCertificate=true
    username: sa
    password: YourPassword123!  # Change this!
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  # Connection Pool
  hikari:
    maximumPoolSize: 10
    minimumIdle: 2
    connectionTimeout: 10000
    maxLifetime: 1800000

# Logging
logging:
  level:
    root: INFO
    org.springframework: DEBUG
    org.springframework.web: DEBUG
    org.springframework.jdbc: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
