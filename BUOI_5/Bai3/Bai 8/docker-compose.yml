version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-nodejs
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nodejs-network

  nodejs:
    build: .
    container_name: nodejs-mysql-app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: user
      DB_PASSWORD: userpass
      DB_NAME: testdb
    depends_on:
      - mysql
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: npm start
    networks:
      - nodejs-network

volumes:
  mysql_data:

networks:
  nodejs-network:
    driver: bridge
